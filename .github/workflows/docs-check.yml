name: Check documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-check.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render public documentation
        run: quarto render docs

