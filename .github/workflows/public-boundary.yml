name: Enforce public repository boundary

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject raw and generated data files
        shell: python
        run: |
          import pathlib
          import sys

          forbidden_suffixes = {
              ".csv", ".tsv", ".jsonl", ".duckdb", ".db", ".sqlite",
              ".sqlite3", ".xlsx", ".xls", ".zip", ".xml",
          }
          forbidden_parts = {"data", "data_sample", "csv_export", "_freeze", "_site"}
          violations = []

          for path in pathlib.Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts:
                  continue
              if path.suffix.lower() in forbidden_suffixes:
                  violations.append(str(path))
                  continue
              if forbidden_parts.intersection(path.parts):
                  violations.append(str(path))

          if violations:
              print("Public-boundary violations:")
              print("\n".join(sorted(violations)))
              sys.exit(1)

          print("No prohibited data artifacts found.")

